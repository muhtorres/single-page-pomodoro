# fly.toml — generated by fly launch
# https://fly.io/docs/reference/configuration/

app = "pomodoro-api"
primary_region = "gru"  # São Paulo — change to nearest region

[build]
  dockerfile = "src/PomodoroApi/Dockerfile"
  # Build context is the repo root (pomodoro-api/)

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # don't sleep (keep on free tier)
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
